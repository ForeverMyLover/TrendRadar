report:
  mode: daily  # 每日汇总模式
  rank_threshold: 5  # 排名在前5的热点会高亮显示
  sort_by_position_first: false
  max_news_per_keyword: 0  # 0表示不限制每个关键词下的新闻数量
  reverse_content_order: false

push:
  channels:
    - wechat  # 开启企业微信推送
  wechat:
    webhook: {{ env.WECHAT_WEBHOOK_URL }}  # 自动读取你设置的 GitHub Secrets

platforms:
  enable_default: true  # 监控默认的35个平台
  extra: []

filters:
  include_keywords: []  # 你可以填入想关注的词，如 ["AI", "股市"]
  exclude_keywords: []  # 你可以填入想屏蔽的词，如 ["游戏", "娱乐"]
